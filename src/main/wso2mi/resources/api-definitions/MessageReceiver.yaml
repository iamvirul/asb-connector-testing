openapi: 3.0.1
info:
  title: MessageReceiver
  description: API Definition of MessageReceiver
  version: 1.0.0
servers:
- url: http://localhost:8290/messagereceiver
- url: https://localhost:8253/messagereceiver
paths:
  /receive:
    get:
      responses:
        default:
          description: Default response
  /receivePayload:
    get:
      responses:
        default:
          description: Default response
  /receiveBatch/{count}:
    get:
      parameters:
      - name: count
        in: path
        required: true
        style: simple
        explode: false
        schema:
          type: string
      responses:
        default:
          description: Default response
  /close:
    get:
      responses:
        default:
          description: Default response
